# ============================================================
# CONFIGURAÇÃO AUTOMÁTICA DO RENDER
# Este arquivo configura o deploy automaticamente.
# Basta conectar o repositório no Render — ele lê este arquivo.
# ============================================================

services:
  - type: web
    name: influencer-landing
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
